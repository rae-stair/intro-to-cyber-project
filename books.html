<!DOCTYPE html>
<html>
<head>
    <title>Staff Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        header {
            background-color: #014421;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        button {
            background-color: #014421;
            color: white;
            border: none;
            padding: 10px;
            margin: 5px;
        }

        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid gray;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>Library System - Staff</h1>
</header>

<div class="container">
    <h2>Book Management</h2>
    <button>Add Book</button>
    <button>Check Out</button>
    <button>Return Book</button>

    <table>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>Example Book</td>
            <td>Author Name</td>
            <td>Available</td>
        </tr>
    </table>

    <h2>Patron Management</h2>
    <button>Add User</button>
    <button>Delete User</button>
</div>

</body>
</html>
